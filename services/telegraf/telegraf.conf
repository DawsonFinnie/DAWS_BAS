# =============================================================================
# services/telegraf/telegraf.conf
# =============================================================================
#
# WHAT IS THIS FILE?
# This is Telegraf's configuration file. It tells Telegraf:
#   1. WHERE to read data FROM  (inputs)
#   2. WHERE to write data TO   (outputs)
#   3. How often to collect and flush data (agent settings)
#
# WHAT IS TELEGRAF?
# Telegraf is a data collection agent made by InfluxData (the same company
# that makes InfluxDB). It is designed to sit between data sources and
# databases, handling the collection and writing automatically.
#
# In DAWS_BAS, Telegraf's job is:
#   Subscribe to RabbitMQ → receive point update messages → write to InfluxDB
#
# WHY USE TELEGRAF INSTEAD OF WRITING DIRECTLY TO INFLUXDB FROM PYTHON?
# You could write a Python script that reads from RabbitMQ and writes to InfluxDB.
# Telegraf is better because:
#   - It handles batching (groups many writes into fewer requests = more efficient)
#   - It handles retries (if InfluxDB is temporarily down, Telegraf buffers data)
#   - It handles connection management automatically
#   - No code to write or maintain - just a config file
#   - It can monitor RabbitMQ's own health metrics at the same time (see below)
#
# HOW THE DATA FLOWS:
#   Protocol Gateway publishes JSON to RabbitMQ exchange "daws.bas"
#       Routing key: "point.bacnet.red_light", "point.modbus.supply_temp", etc.
#           Telegraf's amqp_consumer input subscribes with binding key "point.#"
#               Telegraf receives JSON message, parses it
#                   Telegraf writes measurement to InfluxDB bucket
#                       Grafana reads from InfluxDB and shows on dashboard
#
# CONFIGURATION VARIABLES:
# Lines starting with ${...} are environment variables read from docker-compose.yml
# This keeps secrets (passwords, tokens) out of this config file
#
# =============================================================================


# =============================================================================
# AGENT - Global Telegraf settings
# These settings apply to the whole Telegraf process
# =============================================================================
[agent]

  # How often Telegraf collects data from inputs
  # "10s" = every 10 seconds
  # For building automation data that changes every 30s, 10s is fine
  interval = "10s"

  # How often Telegraf sends batched data to outputs (InfluxDB)
  # Should be the same as or a multiple of interval
  flush_interval = "10s"

  # Hostname to tag all metrics with
  # Shows up in InfluxDB as a tag so you know which Telegraf instance wrote the data
  hostname = "daws-telegraf"

  # Buffer size for metrics waiting to be sent to InfluxDB
  # If InfluxDB is temporarily down, Telegraf stores up to this many metrics in memory
  metric_buffer_limit = 10000


# =============================================================================
# OUTPUT - Write data to InfluxDB
# Telegraf can write to many destinations. We write to InfluxDB v2.
# =============================================================================
[[outputs.influxdb_v2]]
  # InfluxDB server URL
  # In Docker Compose, "influxdb" resolves to the influxdb container's IP
  # In LXC deployment, change this to the actual IP: "http://192.168.30.14:8086"
  urls = ["http://influxdb:8086"]

  # Authentication token for InfluxDB
  # Generated during InfluxDB setup. Read from environment variable for security.
  token = "${INFLUXDB_TOKEN}"

  # InfluxDB organization name (set during InfluxDB initial setup)
  organization = "${INFLUXDB_ORG}"

  # InfluxDB bucket (like a database) where data will be stored
  bucket = "${INFLUXDB_BUCKET}"

  # How long to wait for InfluxDB to respond before timing out
  timeout = "5s"


# =============================================================================
# INPUT - Subscribe to RabbitMQ and receive point update messages
# This is the primary data source for DAWS_BAS.
# Telegraf acts as a RabbitMQ consumer, receiving normalized point messages
# published by the Protocol Gateway.
# =============================================================================
[[inputs.amqp_consumer]]

  # RabbitMQ broker URL
  # Format: amqp://<user>:<pass>@<host>:<port>/<vhost>
  # In Docker Compose, "rabbitmq" resolves to the rabbitmq container's IP
  # In LXC deployment, change to: "amqp://daws:pass@192.168.30.13:5672/bas"
  brokers = ["amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/${RABBITMQ_VHOST}"]

  # The RabbitMQ exchange to bind to
  # This must match the exchange name used in publisher.py
  exchange = "daws.bas"

  # Exchange type - "topic" allows wildcard routing key matching
  exchange_type = "topic"

  # Whether the exchange should survive RabbitMQ restarts
  # "durable" = yes, persist across restarts
  exchange_durability = "durable"

  # The name of Telegraf's queue on RabbitMQ
  # RabbitMQ will create this queue and deliver matching messages to it
  # Each consumer should have a unique queue name
  queue = "telegraf"

  # Whether the queue should survive RabbitMQ restarts
  queue_durability = "durable"

  # The binding key pattern - which messages Telegraf wants to receive
  # "point.#" means: give me ALL messages whose routing key starts with "point."
  # The # wildcard matches zero or more dot-separated words
  # So this receives: "point.bacnet.red_light", "point.modbus.supply_temp", etc.
  binding_key = "point.#"

  # How to parse the message body
  # "json" tells Telegraf to parse each message as a JSON object
  data_format = "json"

  # Which JSON field contains the timestamp
  # Our normalized messages include "timestamp" as Unix milliseconds
  json_time_key = "timestamp"

  # The format of the timestamp value
  # "unix_ms" = Unix timestamp in milliseconds (what we send)
  json_time_format = "unix_ms"

  # Which JSON fields to treat as tags (indexed labels) in InfluxDB
  # Tags are used for filtering and grouping in Grafana queries
  # "device_id", "point_name", "protocol", "unit" are in every normalized message
  tag_keys = ["device_id", "point_name", "protocol", "unit"]

  # The measurement name in InfluxDB (like a table name)
  # All point data goes into one measurement called "point_update"
  # You can then filter by device_id, point_name, protocol tags
  name_override = "point_update"


# =============================================================================
# INPUT - Monitor RabbitMQ's own health and performance
# This is optional but very useful. It tracks:
#   - Queue depths (how many messages are waiting to be consumed)
#   - Message rates (how fast messages are flowing through)
#   - Consumer counts (how many services are connected)
#   - Memory and disk usage of the RabbitMQ broker itself
# All of this shows up in InfluxDB and can be graphed in Grafana.
# =============================================================================
[[inputs.rabbitmq]]

  # RabbitMQ management API URL (the web UI runs the API on port 15672)
  # In Docker Compose, "rabbitmq" resolves to the rabbitmq container
  url = "http://rabbitmq:15672"

  # Credentials for the management API
  username = "${RABBITMQ_USER}"
  password = "${RABBITMQ_PASS}"

  # How often to collect RabbitMQ metrics
  # This overrides the global [agent] interval just for this input
  # RabbitMQ metrics don't need to be collected as frequently as point data
  interval = "30s"
